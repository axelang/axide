<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Axide</title>
</head>

<body>
  <div id="app">
    <div id="titlebar">
      <div class="titlebar-drag">
        <img class="titlebar-logo" src="../../assets/axe.png" alt="Axe Logo" />
        <span class="titlebar-title">Axide</span>
      </div>
    </div>

    <div id="main-layout">
      <div id="activity-bar">
        <button class="activity-btn active" data-panel="explorer" title="Explorer (Ctrl+Shift+E)">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" stroke="currentColor"
              stroke-width="1.8" />
          </svg>
        </button>
        <button class="activity-btn" data-panel="search" title="Search (Ctrl+Shift+F)">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.8" />
            <path d="M16 16l4.5 4.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
          </svg>
        </button>
        <button class="activity-btn" data-panel="debug" title="Debug (Ctrl+Shift+D)">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M12 17a5 5 0 005-5V9a5 5 0 00-10 0v3a5 5 0 005 5z" stroke="currentColor" stroke-width="1.8" />
            <path d="M7 10H3m18 0h-4M7 14H3m18 0h-4M12 17v4m-3 0h6" stroke="currentColor" stroke-width="1.8"
              stroke-linecap="round" />
          </svg>
        </button>
        <div class="activity-spacer"></div>
        <button class="activity-btn" data-panel="settings" title="Settings (Ctrl+,)">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8" />
            <path
              d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"
              stroke="currentColor" stroke-width="1.8" />
          </svg>
        </button>
      </div>

      <div id="sidebar" class="sidebar-visible">
        <div id="sidebar-explorer" class="sidebar-panel active">
          <div class="sidebar-header">
            <span>EXPLORER</span>
            <div class="sidebar-actions">
              <button id="btn-new-file" title="New File" class="icon-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                  <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" stroke="currentColor"
                    stroke-width="2" />
                  <polyline points="14,2 14,8 20,8" stroke="currentColor" stroke-width="2" />
                  <line x1="12" y1="11" x2="12" y2="17" stroke="currentColor" stroke-width="2" />
                  <line x1="9" y1="14" x2="15" y2="14" stroke="currentColor" stroke-width="2" />
                </svg>
              </button>
              <button id="btn-open-folder" title="Open Folder" class="icon-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                  <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z" stroke="currentColor"
                    stroke-width="2" />
                </svg>
              </button>
            </div>
          </div>
          <div id="file-tree" class="sidebar-content"></div>
        </div>
        <div id="sidebar-search" class="sidebar-panel">
          <div class="sidebar-header"><span>SEARCH & REPLACE</span></div>
          <div id="search-panel" class="sidebar-content"></div>
        </div>
        <div id="sidebar-debug" class="sidebar-panel">
          <div class="sidebar-header"><span>DEBUG</span></div>
          <div id="debug-panel" class="sidebar-content"></div>
        </div>
        <div id="sidebar-settings" class="sidebar-panel">
          <div class="sidebar-header"><span>SETTINGS</span></div>
          <div id="settings-panel" class="sidebar-content"></div>
        </div>
      </div>

      <div id="resize-handle-sidebar" class="resize-handle"></div>

      <div id="editor-area">
        <div id="tab-bar"></div>
        <div id="editor-container">
          <div id="welcome-screen">
            <div class="welcome-content">
              <img class="welcome-logo" src="./assets/axe.png" alt="Axe Logo" />
              <h1>Axide</h1>
              <p>Studio for the Axe Programming Language</p>
              <div class="welcome-actions">
                <button id="welcome-open-folder" class="welcome-btn primary">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                    <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"
                      stroke="currentColor" stroke-width="2" />
                  </svg>
                  Open Folder
                </button>
                <button id="welcome-new-file" class="welcome-btn">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                    <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" stroke="currentColor"
                      stroke-width="2" />
                    <polyline points="14,2 14,8 20,8" stroke="currentColor" stroke-width="2" />
                  </svg>
                  New Axe File
                </button>
              </div>
              <div class="welcome-shortcuts">
                <div class="shortcut"><kbd>Ctrl+Shift+E</kbd> Explorer</div>
                <div class="shortcut"><kbd>Ctrl+Shift+F</kbd> Search</div>
                <div class="shortcut"><kbd>Ctrl+Shift+D</kbd> Debug</div>
                <div class="shortcut"><kbd>Ctrl+S</kbd> Save</div>
                <div class="shortcut"><kbd>F5</kbd> Run</div>
                <div class="shortcut"><kbd>F9</kbd> Debug</div>
              </div>
            </div>
          </div>
          <div id="monaco-container"></div>
        </div>

        <div id="resize-handle-panel" class="resize-handle horizontal"></div>

        <div id="bottom-panel" class="panel-collapsed">
          <div id="panel-tabs">
            <button class="panel-tab active" data-target="output-content">Output</button>
            <button class="panel-tab" data-target="debug-console">Debug Console</button>
            <div class="panel-tab-spacer"></div>
            <div id="run-controls">
              <button id="btn-run" class="run-btn" title="Run (F5)">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                  <polygon points="5,3 19,12 5,21" />
                </svg>
                Run
              </button>
              <button id="btn-run-test" class="run-btn" title="Run Tests">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                  <path d="M9 12l2 2 4-4" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />
                  <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.8" />
                </svg>
                Test
              </button>
              <button id="btn-stop" class="run-btn danger" title="Stop" disabled>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                  <rect x="4" y="4" width="16" height="16" rx="2" />
                </svg>
                Stop
              </button>
            </div>
            <button id="btn-toggle-panel" class="icon-btn" title="Toggle Panel">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
              </svg>
            </button>
          </div>
          <div id="panel-content">
            <div id="output-content" class="panel-body active"></div>
            <div id="debug-console" class="panel-body"></div>
          </div>
        </div>
      </div>
    </div>

    <div id="statusbar">
      <div class="status-left">
        <span id="status-branch" class="status-item">Axide</span>
      </div>
      <div class="status-right">
        <span id="status-cursor" class="status-item">Ln 1, Col 1</span>
        <span id="status-language" class="status-item">Axe</span>
        <span id="status-encoding" class="status-item">UTF-8</span>
      </div>
    </div>
  </div>

  <!-- Modals -->
  <div id="modal-overlay" class="hidden">
    <div id="new-file-modal" class="modal hidden">
      <h3>New Axe File</h3>
      <input type="text" id="new-file-name" placeholder="filename.axe" autocomplete="off" />
      <div class="modal-hint">Use path separators to create in subdirectories (e.g. utils/helper.axe)</div>
      <div class="modal-actions">
        <button id="modal-cancel" class="modal-btn">Cancel</button>
        <button id="modal-create" class="modal-btn primary">Create</button>
      </div>
    </div>
  </div>

  <script type="module" src="./src/main.ts"></script>
</body>

</html>
